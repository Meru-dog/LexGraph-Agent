version: "3.9"

services:
  # ─── Neo4j ──────────────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.20-community
    container_name: lexgraph-neo4j
    ports:
      - "7474:7474"   # Neo4j Browser
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: "neo4j/lexgraph_dev"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_memory_heap_initial__size: "512m"
      NEO4J_dbms_memory_heap_max__size: "1G"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_plugins:/plugins
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── Redis (LangGraph state — Phase 2 dev) ──────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: lexgraph-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── FastAPI backend ─────────────────────────────────────────────────────────
  # Vector store: Supabase pgvector (external — set SUPABASE_URL + keys in .env)
  # Document storage: Supabase Storage (external)
  # LLM: Ollama on host machine (http://host.docker.internal:11434)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lexgraph-backend
    ports:
      - "8000:8000"
    environment:
      # Neo4j
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: lexgraph_dev
      # Supabase (pgvector + Storage + Auth)
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      # Ollama — runs on the host, not in Docker
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3-swallow:8b}
      # Auth
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      JWT_ACCESS_EXPIRE_MINUTES: ${JWT_ACCESS_EXPIRE_MINUTES:-60}
      JWT_REFRESH_EXPIRE_DAYS: ${JWT_REFRESH_EXPIRE_DAYS:-7}
      AUDIT_LOG_PATH: /app/data/audit.jsonl
      # Optional: Gemini for non-confidential tasks only
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
    volumes:
      - ./backend:/app
      - backend_data:/app/data
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload --reload-exclude '.venv/*'

  # ─── Next.js frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lexgraph-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_SUPABASE_URL: ${SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    command: npm run dev

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_plugins:
  backend_data:
